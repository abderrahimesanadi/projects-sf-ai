ai:
    platform:
        mistral:
            api_key: '%env(MISTRAL_API_KEY)%'
        openai:
            api_key: '%env(OPENAI_API_KEY)%'
        huggingface:
            api_key: '%env(HUGGINGFACE_API_KEY)%'
    agent:
        stock:
            platform: 'ai.platform.mistral'
            model: 'mistral-small-latest'
            prompt: |
                Tu es un gestionnaire de stock analyse les données de stock situées dans la base de données et la mémoire pour répondre aux questions des utilisateurs.
                Utilise les outils à ta disposition pour répondre aux questions. Si tu ne sais pas répondre à une question, dis-le simplement.
            # quels produits risquent d'être en rupture ?
            tools:
                - 'App\AI\Tools\SimilarityStockSearch'
                - service: 'clock'
                  name: 'clock'
                  description: 'Provides the current date and time.'
                  method: 'now'
            # memory:
            #     service: 'App\Blog\SymfonyVersionsMemory'
        # blog:
            # platform: 'ai.platform.mistral'
            # model: 'mistral-small-latest'
            # prompt: |
            #     You are an helpful assistant that knows about the latest blog content of the Symfony's framework website.
            #     To search for content you use the tool 'similarity_search' for generating the answer. Only use content
            #     that you get from searching with that tool or your previous answers. Don't make up information and if you
            #     can't find something, just say so. Also provide links to the blog posts you use as sources. Use markdown
            #     for formatting the answer and links.
            # tools:
            #     - 'Symfony\AI\Agent\Bridge\SimilaritySearch\SimilaritySearch'
            #     - service: 'clock'
            #       name: 'clock'
            #       description: 'Provides the current date and time.'
            #       method: 'now'
            # memory:
            #     service: 'App\Blog\SymfonyVersionsMemory'
        stream:
            platform: 'ai.platform.mistral'
            model: 'mistral-small-latest'
            prompt:
                file: '%kernel.project_dir%/prompts/stream-chat.txt'
            tools: false
        youtube:
            platform: 'ai.platform.mistral'
            model: 'mistral-small-latest'
            tools: false
        recipe:
            platform: 'ai.platform.mistral'
            model: 'mistral-small-latest'
            prompt:
                text: 'You are a helpful cooking assistant. Provide detailed recipes based on user requests.'
            tools: false
        wikipedia:
            platform: 'ai.platform.mistral'
            model:
               name: 'mistral-small-latest'
            prompt:
                text: |
                    Please answer the users question based on Wikipedia, only use information provided in the messages.
                    If you don't know the answer, say so. Be concise and to the point. Use markdown formatting.
                include_tools: true
            tools:
                - 'Symfony\AI\Agent\Bridge\Wikipedia\Wikipedia'
            include_sources: true
        speech:
            platform: 'ai.platform.mistral'
            model: 'mistral-small-latest'
            prompt: |
                You are a friendly, positive and energetic voice assistant. You can engage in light discussions, ask
                questions, and do general small-talk. If asked about the Symfony Framework or their community events,
                you delegate to your subagent "symfony_blog" and use their answer for answering user's questions.
                If you don't know the answer, say so. Keep in mind that you are in a spoken conversation, so keep your
                answers concise and to the point. They will be read out loud to the user.
            tools:
                - 'Symfony\AI\Agent\Bridge\Clock\Clock'
                # Subagent
                # - agent: 'blog'
                #   name: 'symfony_blog'
                #   description: |
                #       Subagent, that can answer questions about latest news around the Symfony Framework, like latest
                #       features, events or community news.
        # Multi-agent setup
    #     orchestrator:
    #         platform: 'ai.platform.mistral'
    #         model: 'mistral-small-latest'
    #         prompt: 'You are an intelligent agent orchestrator that routes user questions to specialized agents.'
    #         tools: false
    #     technical:
    #         platform: 'ai.platform.mistral'
    #         model: 'mistral-small-latest'
    #         prompt: 'You are a technical support specialist. Help users resolve bugs, problems, and technical errors.'
    #         tools: false
    #     fallback:
    #         platform: 'ai.platform.mistral'
    #         model: 'mistral-small-latest'
    #         prompt: 'You are a helpful general assistant. Assist users with any questions or tasks they may have.'
    #         tools: false
    # multi_agent:
    #     support:
    #         orchestrator: 'orchestrator'
    #         handoffs:
    #             technical: ['bug', 'problem', 'technical', 'error', 'code', 'debug']
    #         fallback: 'fallback'
    store:
        postgres:
            default:
              table_name: 'ai_embeddings'
              dbal_connection: 'doctrine.dbal.default_connection'
              vector_field: embedding
              distance: l2
    vectorizer:
        mistral:
            platform: 'ai.platform.mistral'
            model: 'mistral-embed'
    indexer:
        stock:
            loader: 'App\AI\Loaders\StockDatabaseLoader'
            source: 'stock'
            transformers:
                - 'Symfony\AI\Store\Document\Transformer\TextSplitTransformer'
                - 'Symfony\AI\Store\Document\Transformer\TextTrimTransformer'
            vectorizer: 'ai.vectorizer.mistral'
            store: 'ai.store.postgres.default'
        # blog:
        #     loader: 'Symfony\AI\Store\Document\Loader\RssFeedLoader'
        #     source: 'https://feeds.feedburner.com/symfony/blog'
        #     filters:
        #         - 'app.filter.week_of_symfony'
        #     transformers:
        #         - 'Symfony\AI\Store\Document\Transformer\TextSplitTransformer'
        #         - 'Symfony\AI\Store\Document\Transformer\TextTrimTransformer'
        #     vectorizer: 'ai.vectorizer.mistral'
        #     store: 'ai.store.postgres.default'
    retriever:
        stock:
            store: 'ai.store.postgres.default'
            vectorizer: 'ai.vectorizer.mistral'
        # blog:
        #     store: 'ai.store.postgres.default'
        #     vectorizer: 'ai.vectorizer.mistral'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\AI\Tools\SimilarityStockSearch:
        $vectorizer: '@ai.vectorizer.mistral'
        $store: 'App\AI\Stores\PostgreStore'
    # Symfony\AI\Store\Document\Loader\RssFeedLoader: ~
    Symfony\AI\Store\Document\Transformer\TextSplitTransformer: ~
    Symfony\AI\Store\Document\Transformer\TextTrimTransformer: ~

    # app.filter.week_of_symfony:
    #     class: 'Symfony\AI\Store\Document\Filter\TextContainsFilter'
    #     arguments:
    #         $needle: 'Week of Symfony'
    #         $caseSensitive: false

    App\AI\Loaders\StockDatabaseLoader:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    App\AI\Stores\PostgreStore:
        arguments:
            $connection: '@doctrine.dbal.default_connection'
            $tableName: 'ai_embeddings'
            $vectorFieldName: 'embedding'
            $distance: 'l2'

    Symfony\AI\Store\Document\Vectorizer: '@ai.vectorizer.mistral'                
